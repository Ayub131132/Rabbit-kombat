<!DOCTYPE html>
<html>
<head>
  <title>Rabbit Kombat</title>
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading"><h1>Rabbit Kombat</h1><p>loading...</p><div class="bar"><span></span></div></div>
  <div id="app" style="display:none">
  <div class="tabs-container">
  <button class="tab active" data-tab="home">
    <img src="images/home.png">
  </button>
  <button class="tab" data-tab="friends">
    <img src="images/friends.png">
  </button>
  <button class="tab" data-tab="leaderboard">
    <img src="images/leaderboard.png">
  </button>
  <button class="tab" data-tab="earn">
    <img src="images/earn.png">
  </button>
</div>

<div class="tab-content">
  <section id="home" class="content active">
  <h1 id="points">0</h1>
  <img src="images/logo.webp" alt="logo" id="logo">
  </section>
  <section id="friends" class="content">
  <h1>Invite Friends</h1>
  <p style="color: #aaa; margin: 10px 0;">Share your link and get 5,000 coins!</p>
  
  <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; width: 80%; text-align: center;">
    <input type="text" id="referral-link" readonly 
      style="width: 100%; background: none; border: none; color: #ffec07; text-align: center; font-size: 14px; outline: none;">
  </div>
  
  <button id="copy-btn" style="margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; background: #ffec07; font-weight: bold;">
    Copy Link
  </button>
</section>
  <section id="leaderboard" class="content">
  <h1 style="margin-bottom: 20px;">Top Rabbits</h1>
  <div id="leaderboard-list">
    <p style="text-align: center;">Loading rankings...</p>
  </div>
</section>
  <section id="earn" class="content">
  <h1>Tasks</h1>
  <p id="complete">Complete tasks to earn big rewards!</p>
  
  <div id="tasks-list">
    <div class="task-card">
      <div>
        <p class="task-p">Join Telegram Channel</p>
        <p class="reward">+10,000 🥕</p>
      </div>
      <button onclick="handleTask('join_channel', 10000, 'https://t.me/RabbitKombatOfficial')" id="btn-join_channel" style="background: #ffec07; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold;">Go</button>
    </div>
    <div class="task-card">
      <div>
        <p class="task-p">Join our Youtube Channel</p>
        <p class="reward">+10,000🥕</p>
      </div>
      <button onclick="handleTask('join_youtube', 10000, 'https://youtube.com/@balnix01?si=NhyMTGLoP_AZpquy')" id="btn-join_youtube" style="background: #ffec07; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold;">Go</button>
    </div>
    <div class="task-card">
      <div>
        <p class="task-p">Follow us on Instagram</p>
        <p class="reward">+10,000 🥕</p>
      </div>
      <button onclick="handleTask('follow_instagram', 10000, 'https://www.instagram.com/ofc_ayub_20?igsh=MTF2Mjk2ODNiZTJnOA==')" id="btn-follow_instagram" style="background: #ffec07; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold;">Go</button>
    </div>
  </div>
</section>
</div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
